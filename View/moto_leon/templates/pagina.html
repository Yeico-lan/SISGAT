<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTO LEON RACING — Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          bg: '#222831',
          surface: '#393E46',
          side: '#1e2129',
          gold: '#FFD369',
          muted: '#8b8fa8',
        },

        fontFamily: {
          bebas: ['"Bebas Neue"', 'sans-serif'],
          rajdhani: ['Rajdhani', 'sans-serif'],
        }
      }
    }
  }
</script>

<style>

body{
  font-family: 'Rajdhani', sans-serif;
}

.nav-link{
  transition: .3s;
}

.nav-link:hover{
  background: rgba(255,211,105,.08);
  color: #FFD369;
}

.nav-link.active{
  background: rgba(255,211,105,.12);
  color: #FFD369;
}

.stat-card{
  transition: .3s;
}

.stat-card:hover{
  transform: translateY(-5px);
}

</style>
</head>

<body class="bg-bg text-white flex min-h-screen">

<!-- SIDEBAR -->
<aside class="w-[230px] bg-side border-r border-gold/10 flex flex-col">

  <!-- LOGO -->
  <div class="p-6">

    <div class="w-12 h-12 bg-gold rounded-xl flex items-center justify-center mb-4">

      <svg viewBox="0 0 24 24"
           class="w-6 h-6"
           fill="none"
           stroke="#222831"
           stroke-width="1.8">

        <path d="M5 17a3 3 0 1 0 6 0 3 3 0 0 0-6 0zm11 0a3 3 0 1 0 6 0 3 3 0 0 0-6 0z"/>

      </svg>

    </div>

    <h1 class="font-bebas text-2xl tracking-[3px] text-gold">
      MOTO LEON
    </h1>

    <p class="text-xs text-muted">
      Racing Panel
    </p>

  </div>

  <!-- MENU -->
  <nav class="flex-1 px-3 space-y-2">

    <!-- DASHBOARD -->
    <a href="/dashboard"
       class="nav-link active flex items-center gap-3 px-4 py-3 rounded-xl font-semibold">

      <svg class="w-5 h-5"
           fill="none"
           stroke="currentColor"
           stroke-width="1.8"
           viewBox="0 0 24 24">

        <rect x="3" y="3" width="7" height="7"/>
        <rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/>

      </svg>

      Dashboard

    </a>

    <!-- FACTURACION -->
    <a href="/facturacion"
       class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-muted">

      <svg class="w-5 h-5"
           fill="none"
           stroke="currentColor"
           stroke-width="1.8"
           viewBox="0 0 24 24">

        <path d="M9 14l2 2 4-4"/>
        <path d="M21 12V5H3v7"/>
        <path d="M3 10h18"/>
        <path d="M5 20h14"/>
        <path d="M7 16h10"/>

      </svg>

      Facturación

    </a>

    <!-- CLIENTES -->
    <div class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-muted/40 cursor-not-allowed">

      <svg class="w-5 h-5"
           fill="none"
           stroke="currentColor"
           stroke-width="1.8"
           viewBox="0 0 24 24">

        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>

      </svg>

      Clientes

    </div>

    <!-- PRODUCTOS -->
    <div class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-muted/40 cursor-not-allowed">

      <svg class="w-5 h-5"
           fill="none"
           stroke="currentColor"
           stroke-width="1.8"
           viewBox="0 0 24 24">

        <path d="M21 16V8l-9-5-9 5v8l9 5 9-5z"/>

      </svg>

      Productos

    </div>

  </nav>

  <!-- USUARIO -->
  <div class="p-4 border-t border-gold/10">

    <div class="bg-bg rounded-xl p-3 flex items-center gap-3">

      <div class="w-10 h-10 rounded-full bg-gold/20 flex items-center justify-center">

        <svg class="w-5 h-5 text-gold"
             fill="none"
             stroke="currentColor"
             stroke-width="1.8"
             viewBox="0 0 24 24">

          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>

        </svg>

      </div>

      <div>
        <p class="font-semibold">{{ nombre }}</p>
        <p class="text-sm text-gold">{{ rol }}</p>
      </div>

    </div>

  </div>

</aside>

<!-- MAIN -->
<main class="flex-1 p-8">

  <!-- TITULO -->
  <div class="mb-8">

    <h1 class="font-bebas text-5xl tracking-[4px]">
      PANEL PRINCIPAL
    </h1>

    <p class="text-muted mt-2">
      Bienvenido al sistema Moto Leon Racing
    </p>

  </div>

  <!-- CARDS -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">

    <div class="stat-card bg-surface p-6 rounded-2xl border border-gold/10">

      <p class="text-sm text-muted mb-2">
        Clientes
      </p>

      <h2 class="font-bebas text-5xl text-gold">
        12
      </h2>

    </div>

    <div class="stat-card bg-surface p-6 rounded-2xl border border-gold/10">

      <p class="text-sm text-muted mb-2">
        Motos
      </p>

      <h2 class="font-bebas text-5xl text-gold">
        8
      </h2>

    </div>

    <div class="stat-card bg-surface p-6 rounded-2xl border border-gold/10">

      <p class="text-sm text-muted mb-2">
        Productos
      </p>

      <h2 class="font-bebas text-5xl text-gold">
        25
      </h2>

    </div>

    <div class="stat-card bg-surface p-6 rounded-2xl border border-gold/10">

      <p class="text-sm text-muted mb-2">
        Proveedores
      </p>

      <h2 class="font-bebas text-5xl text-gold">
        5
      </h2>

    </div>

  </div>

</main>

</body>
</html>
