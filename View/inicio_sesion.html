<html lang="es">
<head>
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTO LEON RACING — Iniciar Sesión</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #222831;
    --surface:  #393E46;
    --gold:     #FFD369;
    --text:     #ffffff;
    --muted:    #8b8fa8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background-color: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* ── Animated grid background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,211,105,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,211,105,.06) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridMove 18s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridMove {
    from { background-position: 0 0; }
    to   { background-position: 48px 48px; }
  }

  /* ── Glow orb ── */
  body::after {
    content: '';
    position: fixed;
    width: 520px;
    height: 520px;
    background: radial-gradient(circle, rgba(255,211,105,.14) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    50%       { opacity: .6; transform: translate(-50%, -50%) scale(1.12); }
  }

  /* ── Card ── */
  .card {
    position: relative;
    z-index: 1;
    width: 420px;
    background: var(--surface);
    border-radius: 18px;
    padding: 48px 44px 44px;
    border: 1px solid rgba(255,211,105,.15);
    box-shadow:
      0 0 0 1px rgba(255,211,105,.08),
      0 32px 80px rgba(0,0,0,.5),
      0 0 60px rgba(255,211,105,.06);
    animation: slideUp .6s cubic-bezier(.22,.6,.36,1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Brand strip ── */
  .brand {
    text-align: center;
    margin-bottom: 36px;
  }

  .brand-icon {
    width: 72px;
    height: 72px;
    background: var(--gold);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    box-shadow: 0 8px 24px rgba(255,211,105,.35);
    animation: iconPop .5s .25s cubic-bezier(.34,1.56,.64,1) both;
  }

  @keyframes iconPop {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .brand-icon svg {
    width: 38px;
    height: 38px;
    fill: var(--bg);
  }

  .brand h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 3px;
    color: var(--gold);
    line-height: 1;
  }

  .brand p {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,211,105,.3), transparent);
    margin-bottom: 32px;
  }

  /* ── Form ── */
  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 600;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    fill: none;
    stroke: var(--muted);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke .25s;
    pointer-events: none;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 13px 14px 13px 42px;
    background: var(--bg);
    border: 1.5px solid rgba(255,211,105,.15);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 500;
    outline: none;
    transition: border-color .25s, box-shadow .25s;
  }

  input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(255,211,105,.12);
  }

  input:focus + svg,
  .input-wrap:has(input:focus) svg { stroke: var(--gold); }

  /* toggle password */
  .toggle-pw {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    color: var(--muted);
    transition: color .2s;
  }
  .toggle-pw:hover { color: var(--gold); }
  .toggle-pw svg {
    width: 16px;
    height: 16px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    pointer-events: none;
    position: static;
    transform: none;
  }

  /* ── Options row ── */
  .options {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    font-size: 13px;
  }

  .remember {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: var(--muted);
    user-select: none;
  }

  .remember input { display: none; }

  .checkmark {
    width: 16px;
    height: 16px;
    border: 1.5px solid rgba(255,211,105,.3);
    border-radius: 4px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s, border-color .2s;
    flex-shrink: 0;
  }

  .remember input:checked ~ .checkmark {
    background: var(--gold);
    border-color: var(--gold);
  }

  .checkmark::after {
    content: '';
    width: 8px;
    height: 5px;
    border-left: 2px solid var(--bg);
    border-bottom: 2px solid var(--bg);
    transform: rotate(-45deg) translateY(-1px);
    opacity: 0;
    transition: opacity .15s;
  }

  .remember input:checked ~ .checkmark::after { opacity: 1; }

  .forgot {
    color: var(--gold);
    text-decoration: none;
    font-weight: 600;
    font-size: 13px;
    transition: opacity .2s;
  }
  .forgot:hover { opacity: .75; }

  /* ── Button ── */
  .btn-login {
    width: 100%;
    padding: 15px;
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 8px 24px rgba(255,211,105,.3);
  }

  .btn-login::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.2), transparent);
    opacity: 0;
    transition: opacity .2s;
  }

  .btn-login:hover::before { opacity: 1; }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(255,211,105,.4); }
  .btn-login:active { transform: translateY(0); }

  /* ── Error message ── */
  .error-msg {
    display: none;
    background: rgba(220,60,60,.12);
    border: 1px solid rgba(220,60,60,.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #f08080;
    margin-top: 16px;
    text-align: center;
    animation: shake .35s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }

  /* ── Footer ── */
  .card-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .card-footer span { color: var(--gold); }
</style>
</head>
<body>

<div class="card">

  <div class="brand">
    <div class="brand-icon">
      <!-- Motorcycle / helmet icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 17a3 3 0 1 0 6 0 3 3 0 0 0-6 0zm11 0a3 3 0 1 0 6 0 3 3 0 0 0-6 0zM2 9l2-4h9l3 4M7 9l1-4M13 9l2-4M2 9h20M9 13l3-4 3 4"/>
      </svg>
    </div>
    <h1>MOTO LEON RACING</h1>
    <p>Sistema de Gestión</p>
  </div>

  <div class="divider"></div>

  <div class="form-group">
    <label for="usuario">Usuario</label>
    <div class="input-wrap">
      <input type="text" id="usuario" placeholder="Ingresa tu usuario" autocomplete="off">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none;">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </div>
  </div>

  <div class="form-group">
    <label for="contrasena">Contraseña</label>
    <div class="input-wrap">
      <input type="password" id="contrasena" placeholder="Ingresa tu contraseña" autocomplete="off">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none;">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <button class="toggle-pw" id="togglePw" type="button" title="Mostrar contraseña">
        <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <div class="options">
    <label class="remember">
      <input type="checkbox" id="remember">
      <span class="checkmark"></span>
      Recordarme
    </label>
    <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
  </div>

  <button class="btn-login" id="btnLogin">INICIAR SESIÓN</button>

  <div class="error-msg" id="errorMsg">
    ⚠️ Usuario o contraseña incorrectos
  </div>

  <div class="card-footer">
    © 2025 <span>Moto Leon Racing</span> — Todos los derechos reservados
  </div>

</div>

<script>
  /* Toggle password visibility */
  const togglePw  = document.getElementById('togglePw');
  const pwInput   = document.getElementById('contrasena');
  const eyeIcon   = document.getElementById('eyeIcon');

  togglePw.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  });

  /* Login logic — demo credentials: admin / 1234 */
  document.getElementById('btnLogin').addEventListener('click', login);
  document.getElementById('contrasena').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

  function login() {
    const user = document.getElementById('usuario').value.trim();
    const pass = document.getElementById('contrasena').value;
    const err  = document.getElementById('errorMsg');

    if (user === 'admin' && pass === '1234') {
      document.getElementById('btnLogin').textContent = '✓ ACCEDIENDO...';
      document.getElementById('btnLogin').style.background = '#4caf50';
      setTimeout(() => {
        // Replace this with your actual redirect: window.location.href = 'dashboard.html';
        alert('¡Bienvenido, Administrador!');
        document.getElementById('btnLogin').textContent = 'INICIAR SESIÓN';
        document.getElementById('btnLogin').style.background = '';
      }, 1000);
      err.style.display = 'none';
    } else {
      err.style.display = 'block';
      err.style.animation = 'none';
      void err.offsetWidth;
      err.style.animation = 'shake .35s ease';
    }
  }
</script>

</body>
</html>
