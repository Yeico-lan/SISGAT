<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTO LEON RACING — Iniciar Sesión</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Tailwind config: colores y fuentes personalizadas -->
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          bg:      '#222831',
          surface: '#393E46',
          gold:    '#FFD369',
          muted:   '#8b8fa8',
        },
        fontFamily: {
          bebas:   ['"Bebas Neue"', 'sans-serif'],
          rajdhani: ['Rajdhani', 'sans-serif'],
        },
        keyframes: {
          slideUp: {
            '0%':   { opacity: '0', transform: 'translateY(32px)' },
            '100%': { opacity: '1', transform: 'translateY(0)' },
          },
          iconPop: {
            '0%':   { transform: 'scale(0)', opacity: '0' },
            '100%': { transform: 'scale(1)', opacity: '1' },
          },
          gridMove: {
            '0%':   { backgroundPosition: '0 0' },
            '100%': { backgroundPosition: '48px 48px' },
          },
          pulseglow: {
            '0%,100%': { opacity: '1', transform: 'translate(-50%,-50%) scale(1)' },
            '50%':     { opacity: '.6', transform: 'translate(-50%,-50%) scale(1.12)' },
          },
          shake: {
            '0%,100%': { transform: 'translateX(0)' },
            '25%':     { transform: 'translateX(-6px)' },
            '75%':     { transform: 'translateX(6px)' },
          },
        },
        animation: {
          slideUp:   'slideUp .6s cubic-bezier(.22,.6,.36,1) both',
          iconPop:   'iconPop .5s .25s cubic-bezier(.34,1.56,.64,1) both',
          gridMove:  'gridMove 18s linear infinite',
          pulseglow: 'pulseglow 4s ease-in-out infinite',
          shake:     'shake .35s ease',
        },
      },
    },
  }
</script>

<style>
  /* Fuente base global */
  body { font-family: 'Rajdhani', sans-serif; }

  /* Cuadrícula animada de fondo */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,211,105,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,211,105,.06) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridMove 18s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  /* Orbe de brillo dorado */
  body::after {
    content: '';
    position: fixed;
    width: 520px;
    height: 520px;
    background: radial-gradient(circle, rgba(255,211,105,.14) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    pointer-events: none;
    z-index: 0;
    animation: pulseglow 4s ease-in-out infinite;
  }

  /* Divisor degradado */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,211,105,.3), transparent);
  }

  /* Input: borde dorado al enfocar */
  .input-field:focus {
    outline: none;
    border-color: #FFD369;
    box-shadow: 0 0 0 3px rgba(255,211,105,.12);
  }

  /* Ícono se vuelve dorado cuando el input está enfocado */
  .input-wrap:focus-within .input-icon { stroke: #FFD369; }

  /* Botón: efecto brillo al hover */
  .btn-login::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.2), transparent);
    opacity: 0;
    transition: opacity .2s;
    border-radius: 10px;
  }
  .btn-login:hover::before { opacity: 1; }

  /* Checkbox personalizado */
  .remember input { display: none; }
  .checkmark {
    width: 16px; height: 16px;
    border: 1.5px solid rgba(255,211,105,.3);
    border-radius: 4px;
    background: #222831;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, border-color .2s;
    flex-shrink: 0;
  }
  .remember input:checked ~ .checkmark {
    background: #FFD369;
    border-color: #FFD369;
  }
  .checkmark::after {
    content: '';
    width: 8px; height: 5px;
    border-left: 2px solid #222831;
    border-bottom: 2px solid #222831;
    transform: rotate(-45deg) translateY(-1px);
    opacity: 0;
    transition: opacity .15s;
  }
  .remember input:checked ~ .checkmark::after { opacity: 1; }
</style>
</head>

<!-- BODY: fondo oscuro, flex centrado -->
<body class="min-h-screen bg-bg flex items-center justify-center overflow-hidden relative">

  <!-- TARJETA principal -->
  <div class="card relative z-10 w-[420px] bg-surface rounded-[18px] px-11 pt-12 pb-11
              border border-gold/15
              shadow-[0_0_0_1px_rgba(255,211,105,.08),0_32px_80px_rgba(0,0,0,.5),0_0_60px_rgba(255,211,105,.06)]
              animate-slideUp">

    <!-- MARCA -->
    <div class="text-center mb-9">

      <!-- Ícono de moto -->
      <div class="brand-icon w-[72px] h-[72px] bg-gold rounded-[18px] flex items-center justify-center
                  mx-auto mb-4 shadow-[0_8px_24px_rgba(255,211,105,.35)] animate-iconPop">
        <svg viewBox="0 0 24 24" class="w-[38px] h-[38px] fill-bg stroke-bg stroke-[1.5]"
             xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#222831" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 17a3 3 0 1 0 6 0 3 3 0 0 0-6 0zm11 0a3 3 0 1 0 6 0 3 3 0 0 0-6 0z
                   M2 9l2-4h9l3 4M7 9l1-4M13 9l2-4M2 9h20M9 13l3-4 3 4"/>
        </svg>
      </div>

      <h1 class="font-bebas text-[26px] tracking-[3px] text-gold leading-none">
        MOTO LEON RACING
      </h1>
      <p class="text-[11px] text-muted tracking-[2px] uppercase mt-1">
        Sistema de Gestión
      </p>
    </div>

    <!-- DIVISOR -->
    <div class="divider mb-8"></div>

    <!-- CAMPO: Usuario -->
    <div class="mb-5">
      <label for="usuario"
             class="block text-[11px] tracking-[2px] uppercase text-muted mb-2 font-semibold">
        Usuario
      </label>
      <div class="input-wrap relative">
        <input type="text" id="usuario" placeholder="Ingresa tu usuario" autocomplete="off"
               class="input-field w-full py-[13px] pr-[14px] pl-[42px]
                      bg-bg border border-gold/15 rounded-[10px]
                      text-white font-rajdhani text-[15px] font-medium
                      transition-all duration-200"/>
        <!-- Ícono usuario -->
        <svg class="input-icon absolute left-[14px] top-1/2 -translate-y-1/2 w-4 h-4
                    fill-none stroke-muted stroke-2 pointer-events-none transition-all duration-200"
             viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </div>
    </div>

    <!-- CAMPO: Contraseña -->
    <div class="mb-5">
      <label for="contrasena"
             class="block text-[11px] tracking-[2px] uppercase text-muted mb-2 font-semibold">
        Contraseña
      </label>
      <div class="input-wrap relative">
        <input type="password" id="contrasena" placeholder="Ingresa tu contraseña" autocomplete="off"
               class="input-field w-full py-[13px] pr-[42px] pl-[42px]
                      bg-bg border border-gold/15 rounded-[10px]
                      text-white font-rajdhani text-[15px] font-medium
                      transition-all duration-200"/>
        <!-- Ícono candado -->
        <svg class="input-icon absolute left-[14px] top-1/2 -translate-y-1/2 w-4 h-4
                    fill-none stroke-muted stroke-2 pointer-events-none transition-all duration-200"
             viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"
             stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <!-- Botón ojo -->
        <button id="togglePw" type="button" title="Mostrar contraseña"
                class="absolute right-3 top-1/2 -translate-y-1/2
                       bg-transparent border-none cursor-pointer p-1
                       text-muted hover:text-gold transition-colors duration-200 flex items-center">
          <svg id="eyeIcon" viewBox="0 0 24 24"
               class="w-4 h-4 fill-none stroke-current stroke-2 pointer-events-none"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- OPCIONES: Recordarme + Olvidaste contraseña -->
    <div class="flex items-center justify-between mb-7 text-[13px]">

      <label class="remember flex items-center gap-2 cursor-pointer text-muted select-none">
        <input type="checkbox" id="remember">
        <span class="checkmark"></span>
        Recordarme
      </label>

      <a href="#" class="text-gold font-semibold hover:opacity-75 transition-opacity duration-200">
        ¿Olvidaste tu contraseña?
      </a>
    </div>

    <!-- BOTÓN INICIAR SESIÓN -->
    <button id="btnLogin"
            class="btn-login relative w-full py-[15px] bg-gold text-bg
                   font-bebas text-[18px] tracking-[3px] rounded-[10px]
                   cursor-pointer overflow-hidden border-none
                   shadow-[0_8px_24px_rgba(255,211,105,.3)]
                   hover:-translate-y-0.5 hover:shadow-[0_12px_32px_rgba(255,211,105,.4)]
                   active:translate-y-0
                   transition-all duration-150">
      INICIAR SESIÓN
    </button>

    <!-- MENSAJE DE ERROR -->
    <div id="errorMsg"
         class="hidden mt-4 px-[14px] py-[10px]
                bg-red-500/10 border border-red-500/30 rounded-lg
                text-[13px] text-red-300 text-center">
      ⚠️ Usuario o contraseña incorrectos
    </div>

    <!-- PIE DE PÁGINA -->
    <p class="text-center mt-6 text-[12px] text-muted tracking-[1px]">
      © 2026 <span class="text-gold">Moto Leon Racing</span> — Todos los derechos reservados
    </p>

  </div><!-- /card -->

<script>
  /* ── Toggle mostrar/ocultar contraseña ── */
  const togglePw = document.getElementById('togglePw');
  const pwInput  = document.getElementById('contrasena');
  const eyeIcon  = document.getElementById('eyeIcon');

  togglePw.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  });

  /* ── Login con botón o tecla Enter ── */
  document.getElementById('btnLogin').addEventListener('click', login);
  document.getElementById('contrasena').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  function login() {
    const user = document.getElementById('usuario').value.trim();
    const pass = document.getElementById('contrasena').value;
    const err  = document.getElementById('errorMsg');
    const btn  = document.getElementById('btnLogin');

    if (user === 'admin' && pass === '1234') {
      btn.textContent = '✓ ACCEDIENDO...';
      btn.style.background = '#4caf50';
      err.classList.add('hidden');
      setTimeout(() => {
        // Cambia esto por: window.location.href = 'dashboard.html';
        alert('¡Bienvenido, Administrador!');
        btn.textContent = 'INICIAR SESIÓN';
        btn.style.background = '';
      }, 1000);
    } else {
      err.classList.remove('hidden');
      err.style.animation = 'none';
      void err.offsetWidth;
      err.style.animation = 'shake .35s ease';
    }
  }
</script>

</body>
</html>
