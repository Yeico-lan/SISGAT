<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTO LEON RACING — Registrar Usuario</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: { bg:'#222831', surface:'#393E46', gold:'#FFD369', muted:'#8b8fa8' },
        fontFamily: { bebas:['"Bebas Neue"','sans-serif'], rajdhani:['Rajdhani','sans-serif'] },
        keyframes: {
          slideUp: { '0%':{opacity:'0',transform:'translateY(24px)'}, '100%':{opacity:'1',transform:'translateY(0)'} },
          shake:   { '0%,100%':{transform:'translateX(0)'}, '25%':{transform:'translateX(-6px)'}, '75%':{transform:'translateX(6px)'} },
        },
        animation: { slideUp:'slideUp .5s ease both', shake:'shake .35s ease' }
      },
    },
  }
</script>
<style>
  body { font-family:'Rajdhani',sans-serif; }
  body::before {
    content:''; position:fixed; inset:0;
    background-image: linear-gradient(rgba(255,211,105,.05) 1px,transparent 1px),
                      linear-gradient(90deg,rgba(255,211,105,.05) 1px,transparent 1px);
    background-size:48px 48px; pointer-events:none; z-index:0;
  }
  .input-field:focus {
    outline:none; border-color:#FFD369;
    box-shadow:0 0 0 3px rgba(255,211,105,.12);
  }
  .input-wrap:focus-within .input-icon { stroke:#FFD369; }
  .btn-submit::before {
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);
    opacity:0; transition:opacity .2s; border-radius:10px;
  }
  .btn-submit:hover::before { opacity:1; }
  .spinner {
    display:inline-block; width:15px; height:15px;
    border:2px solid rgba(34,40,49,.4); border-top-color:#222831;
    border-radius:50%; animation:spin .6s linear infinite;
    vertical-align:middle; margin-right:8px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .divider { height:1px; background:linear-gradient(90deg,transparent,rgba(255,211,105,.25),transparent); }
</style>
</head>

<body class="min-h-screen bg-bg text-white">

  <!-- NAVBAR -->
  <nav class="relative z-10 flex items-center justify-between px-8 py-4
              border-b border-gold/10 bg-surface/60 backdrop-blur-sm">
    <a href="/dashboard" class="font-bebas text-[22px] tracking-[3px] text-gold hover:opacity-80 transition-opacity">
      ← MOTO LEON RACING
    </a>
    <span class="text-muted text-[13px]">
      <span class="text-white font-semibold">{{ nombre }}</span>
      &nbsp;·&nbsp;<span class="text-gold">{{ rol }}</span>
    </span>
  </nav>

  <!-- FORMULARIO -->
  <div class="relative z-10 flex justify-center px-4 py-12">
    <div class="w-full max-w-[480px] bg-surface rounded-[18px] px-10 pt-10 pb-10
                border border-gold/15
                shadow-[0_32px_80px_rgba(0,0,0,.5),0_0_60px_rgba(255,211,105,.05)]
                animate-slideUp">

      <!-- Encabezado -->
      <div class="text-center mb-8">
        <div class="w-[60px] h-[60px] bg-gold rounded-[14px] flex items-center justify-center mx-auto mb-4
                    shadow-[0_8px_24px_rgba(255,211,105,.3)]">
          <svg class="w-7 h-7" fill="none" stroke="#222831" stroke-width="1.8"
               viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <line x1="19" y1="8" x2="19" y2="14"/>
            <line x1="22" y1="11" x2="16" y2="11"/>
          </svg>
        </div>
        <h1 class="font-bebas text-[24px] tracking-[3px] text-gold">REGISTRAR USUARIO</h1>
        <p class="text-[11px] text-muted tracking-[2px] uppercase mt-1">Nuevo acceso al sistema</p>
      </div>

      <div class="divider mb-7"></div>

      <!-- Fila: Nombre + Apellido -->
      <div class="grid grid-cols-2 gap-4 mb-5">
        <div>
          <label class="block text-[11px] tracking-[2px] uppercase text-muted mb-2 font-semibold">
            Nombre <span class="text-gold">*</span>
          </label>
          <div class="input-wrap relative">
            <input type="text" id="nombre" placeholder="Carlos" autocomplete="off"
                   class="input-field w-full py-[11px] pl-[38px] pr-3
                          bg-bg border border-gold/15 rounded-[10px]
                          text-white text-[14px] font-medium transition-all duration-200"/>
            <svg class="input-icon absolute left-[11px] top-1/2 -translate-y-1/2 w-4 h-4
                        fill-none stroke-muted stroke-2 pointer-events-none transition-all duration-200"
                 viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </div>
        </div>
        <div>
          <label class="block text-[11px] tracking-[2px] uppercase text-muted mb-2 font-semibold">
            Apellido <span class="text-gold">*</span>
          </label>
          <div class="input-wrap relative">
            <input type="text" id="apellido" placeholder="Mendoza" autocomplete="off"
                   class="input-field w-full py-[11px] pl-[38px] pr-3
                          bg-bg border border-gold/15 rounded-[10px]
                          text-white text-[14px] font-medium transition-all duration-200"/>
            <svg class="input-icon absolute left-[11px] top-1/2 -translate-y-1/2 w-4 h-4
                        fill-none stroke-muted stroke-2 pointer-events-none transition-all duration-200"
                 viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Correo -->
      <div class="mb-5">
        <label class="block text-[11px] tracking-[2px] uppercase text-muted mb-2 font-semibold">
          Correo electrónico <span class="text-gold">*</span>
        </label>
        <div class="input-wrap relative">
          <input type="email" id="correo" placeholder="usuario@correo.com" autocomplete="off"
                 class="input-field w-full py-[11px] pl-[38px] pr-3
                        bg-bg border border-gold/15 rounded-[10px]
                        text-white text-[14px] font-medium transition-all duration-200"/>
          <svg class="input-icon absolute left-[11px] top-1/2 -translate-y-1/2 w-4 h-4
                      fill-none stroke-muted stroke-2 pointer-events-none transition-all duration-200"
               viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
      </div>

      <!-- Fila: Teléfono + Rol -->
      <div class="grid grid-cols-2 gap-4 mb-5">
        <div>
          <label class="block text-[11px] tracking-[2px] uppercase text-muted mb-2 font-semibold">
            Teléfono
          </label>
          <div class="input-wrap relative">
            <input type="tel" id="telefono" placeholder="3201234567" maxlength="10" autocomplete="off"
                   class="input-field w-full py-[11px] pl-[38px] pr-3
                          bg-bg border border-gold/15 rounded-[10px]
                          text-white text-[14px] font-medium transition-all duration-200"/>
            <svg class="input-icon absolute left-[11px] top-1/2 -translate-y-1/2 w-4 h-4
                        fill-none stroke-muted stroke-2 pointer-events-none transition-all duration-200"
                 viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 11.39 19a19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </div>
        </div>
        <div>
          <label class="block text-[11px] tracking-[2px] uppercase text-muted mb-2 font-semibold">
            Rol <span class="text-gold">*</span>
          </label>
          <select id="id_rol"
                  class="input-field w-full py-[11px] px-3
                         bg-bg border border-gold/15 rounded-[10px]
                         text-white text-[14px] font-medium transition-all duration-200
                         cursor-pointer appearance-none">
            <option value="">Seleccionar...</option>
            {% for r in roles %}
            <option value="{{ r.rol_id }}">{{ r.rol_nombre }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <!-- Contraseña -->
      <div class="mb-7">
        <label class="block text-[11px] tracking-[2px] uppercase text-muted mb-2 font-semibold">
          Contraseña <span class="text-gold">*</span>
          <span class="text-muted normal-case tracking-normal font-normal ml-1">(mín. 6 caracteres)</span>
        </label>
        <div class="input-wrap relative">
          <input type="password" id="contrasena" placeholder="••••••••" autocomplete="new-password"
                 class="input-field w-full py-[11px] pl-[38px] pr-[40px]
                        bg-bg border border-gold/15 rounded-[10px]
                        text-white text-[14px] font-medium transition-all duration-200"/>
          <svg class="input-icon absolute left-[11px] top-1/2 -translate-y-1/2 w-4 h-4
                      fill-none stroke-muted stroke-2 pointer-events-none transition-all duration-200"
               viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <button id="togglePw" type="button"
                  class="absolute right-3 top-1/2 -translate-y-1/2 bg-transparent border-none
                         cursor-pointer p-1 text-muted hover:text-gold transition-colors duration-200">
            <svg id="eyeIcon" viewBox="0 0 24 24"
                 class="w-4 h-4 fill-none stroke-current stroke-2 pointer-events-none"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- BOTÓN -->
      <button id="btnRegistrar"
              class="btn-submit relative w-full py-[14px] bg-gold text-bg
                     font-bebas text-[18px] tracking-[3px] rounded-[10px]
                     cursor-pointer overflow-hidden border-none
                     shadow-[0_8px_24px_rgba(255,211,105,.3)]
                     hover:-translate-y-0.5 hover:shadow-[0_12px_32px_rgba(255,211,105,.4)]
                     active:translate-y-0 transition-all duration-150">
        CREAR USUARIO
      </button>

      <!-- Mensajes -->
      <div id="errorMsg"
           class="hidden mt-4 px-4 py-3 bg-red-500/10 border border-red-500/30
                  rounded-lg text-[13px] text-red-300 text-center"></div>
      <div id="successMsg"
           class="hidden mt-4 px-4 py-3 bg-green-500/10 border border-green-500/30
                  rounded-lg text-[13px] text-green-300 text-center"></div>

    </div>
  </div>

<script>
  /* Toggle contraseña */
  const togglePw = document.getElementById('togglePw');
  const pwInput  = document.getElementById('contrasena');
  const eyeIcon  = document.getElementById('eyeIcon');
  togglePw.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  });

  /* Registrar */
  document.getElementById('btnRegistrar').addEventListener('click', registrar);
  document.getElementById('contrasena').addEventListener('keydown', e => {
    if (e.key === 'Enter') registrar();
  });

  async function registrar() {
    const errorMsg   = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const btn        = document.getElementById('btnRegistrar');

    errorMsg.classList.add('hidden');
    successMsg.classList.add('hidden');

    const payload = {
      nombre:     document.getElementById('nombre').value.trim(),
      apellido:   document.getElementById('apellido').value.trim(),
      correo:     document.getElementById('correo').value.trim(),
      telefono:   document.getElementById('telefono').value.trim(),
      id_rol:     document.getElementById('id_rol').value,
      contrasena: document.getElementById('contrasena').value,
    };

    if (!payload.nombre || !payload.apellido || !payload.correo || !payload.id_rol || !payload.contrasena) {
      mostrarError('Completa todos los campos obligatorios (*)');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>GUARDANDO...';

    try {
      const res  = await fetch('/api/registrar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();

      if (data.ok) {
        btn.style.background = '#4caf50';
        btn.innerHTML = '✓ USUARIO CREADO';
        successMsg.textContent = data.mensaje;
        successMsg.classList.remove('hidden');
        // Limpiar formulario
        ['nombre','apellido','correo','telefono','contrasena'].forEach(id => {
          document.getElementById(id).value = '';
        });
        document.getElementById('id_rol').value = '';
        setTimeout(() => {
          btn.disabled = false;
          btn.innerHTML = 'CREAR USUARIO';
          btn.style.background = '';
          successMsg.classList.add('hidden');
        }, 3000);
      } else {
        mostrarError(data.mensaje);
        btn.disabled = false;
        btn.innerHTML = 'CREAR USUARIO';
      }
    } catch {
      mostrarError('Error de conexión con el servidor');
      btn.disabled = false;
      btn.innerHTML = 'CREAR USUARIO';
    }
  }

  function mostrarError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = '⚠️ ' + msg;
    el.classList.remove('hidden');
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = 'shake .35s ease';
  }
  
  document.getElementById("formUsuario").addEventListener("submit", function(e) {
    const correo = document.getElementById("correo").value.trim();

    const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (!regex.test(correo)) {
        e.preventDefault();
        alert("Ingrese un correo electrónico válido.");
    }
});
</script>
</body>
</html>
